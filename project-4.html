<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Registration Form</title>
    <link rel="stylesheet" href="./style4.css" />
  </head>
  <body>
    <h1>Course Registration Form</h1>
    <form action="">
      <fieldset>
        <legend>Registaration Form</legend>
        <table>
          <tr>
            <td><label for="First Name">First Name</label></td>
            <td>
              <input
                name="First Name"
                id="First Name"
                type="text"
                placeholder="Ex: Babjan"
                required
              />
            </td>
          </tr>
          <tr>
            <td><label for="SurName">SurName</label></td>
            <td>
              <input
                name="SurName"
                id="SurName"
                type="text"
                placeholder="Ex: Shaik"
                required
              />
            </td>
          </tr>
          <tr>
            <td><label for="mobnum">Mobile Number</label></td>
            <td><input name="mobnum" id="mobnum" type="tel" value="+91" /></td>
          </tr>
          <tr>
            <td><label for="email">Email ID</label></td>
            <td><input name="email" id="email" type="email" /></td>
          </tr>
          <tr>
            <td><label for="password">Password</label></td>
            <td><input name="password" id="password" type="Password" /></td>
          </tr>
          <tr>
            <td><label for="cpassword">Confirm Password</label></td>
            <td><input name="cpassword" id="cpassword" type="Password" /></td>
          </tr>
          <tr>
            <td><label for="dob">DOB</label></td>
            <td><input type="date" name="dob" id="dob" /></td>
          </tr>
          <tr>
            <td><label for="age">AGE</label></td>
            <td>
              <input name="age" id="age" type="number" max="35" min="18" />
            </td>
          </tr>
          <tr>
            <td><label for="gender">Gender</label></td>
            <td>
              <input
                type="radio"
                name="gender"
                id="gender"
                value="Male"
              /><label for="male">Male</label>
              <input type="radio" name="gender" id="gender" value="Female" />
              <label for="female">Female</label>

              <input type="radio" name="gender" id="gender" value="Other" />
              <label for="other">Other</label><br />
            </td>
          </tr>
          <tr>
            <td><label for="selection">Select Country</label></td>
            <td>
              <select name="" id="">
                <option value="INDIA">INDIA</option>
                <option value="USA">USA</option>
                <option value="ENGLAND">ENGLAND</option>
                <option value="JAPAN">JAPAN</option>
                <option value="GERMANY">GERMANY</option></select
              ><br />
            </td>
          </tr>
          <tr>
            <td><label for="upload">Upload File</label></td>
            <td><input name="upload" id="upload" type="file" /></td>
          </tr>
        </table>
      </fieldset>
      <br />

      <input type="Reset" />
      <br />
      <br />
      <fieldset>
        <table>
          <tr>
            <td><label for="Course Detail">Course Detail</label></td>
            <td>
              <select name="" id="">
                <option value="">Python Full Stack</option>
                <option value="">Java Full Stack</option>
                <option value="">HTML & CSS</option>
              </select>
            </td>
          </tr>
          <tr>
            <td><label for="Delivery Mode">Delivery Mode</label></td>
            <td>
              <input type="checkbox" name="mode" onclick="onlyOne(this)" />
              ONLINE
              <input type="checkbox" name="mode" onclick="onlyOne(this)" />
              OFFLINE
              <script>
                function onlyOne(checkbox) {
                  const checkboxes = document.getElementsByName("mode");
                  checkboxes.forEach((cb) => (cb.checked = false));
                  checkbox.checked = true;
                }
              </script>
            </td>
          </tr>
          <tr>
            <td><label for="INSTITUTE Mode">Institute Mode :</label></td>
            <td><input type="text" value="TAP ACADEMY" /></td>
          </tr>
          <tr>
            <td><label for="Comments">Comments</label></td>
            <td>
              <textarea
                id="comments"
                name="comments"
                rows="2"
                cols="19.5"
                maxlength="500"
                minlength="50"
              ></textarea>
            </td>
          </tr>
        </table>
      </fieldset>
      <br />

      <input type="submit" />
    </form>
  </body>
</html>
